apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-forge.fullname" . }}-api
  labels:
    {{- include "data-forge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "data-forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "data-forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "data-forge.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $apiKeys := .Values.secrets.apiKeys | default (list) }}
      {{- $awsAccessKeyId := default "" .Values.secrets.awsAccessKeyId }}
      {{- $awsSecretAccessKey := default "" .Values.secrets.awsSecretAccessKey }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "data-forge.fullname" . }}
            {{- if and .Values.secrets.create (or (gt (len $apiKeys) 0) $awsAccessKeyId $awsSecretAccessKey) }}
            - secretRef:
                name: {{ include "data-forge.fullname" . }}-secrets
            {{- end }}
          {{- with .Values.api.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or (eq .Values.dataforge.outputMode "local") .Values.storage.existingClaim .Values.dataforge.extraVolumeMounts .Values.api.extraVolumeMounts }}
          volumeMounts:
            {{- if or (eq .Values.dataforge.outputMode "local") .Values.storage.existingClaim }}
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
            {{- end }}
            {{- with .Values.dataforge.extraVolumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.api.extraVolumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or (eq .Values.dataforge.outputMode "local") .Values.storage.existingClaim .Values.extraVolumes }}
      volumes:
        {{- if or (eq .Values.dataforge.outputMode "local") .Values.storage.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-storage" (include "data-forge.fullname" .)) .Values.storage.existingClaim }}
        {{- end }}
        {{- with .Values.extraVolumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
