{{- if .Values.secrets.create }}
{{- $awsAccessKeyId := default "" .Values.secrets.awsAccessKeyId }}
{{- $awsSecretAccessKey := default "" .Values.secrets.awsSecretAccessKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "data-forge.fullname" . }}-secrets
  labels:
    {{- include "data-forge.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with $awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- with $awsSecretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
