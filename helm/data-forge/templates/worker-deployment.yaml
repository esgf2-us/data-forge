apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-forge.fullname" . }}-worker
  labels:
    {{- include "data-forge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "data-forge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "data-forge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- with .Values.worker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "data-forge.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $awsAccessKeyId := default "" .Values.secrets.awsAccessKeyId }}
      {{- $awsSecretAccessKey := default "" .Values.secrets.awsSecretAccessKey }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["dramatiq", "dataforge.workers.converter_worker"]
          envFrom:
            - configMapRef:
                name: {{ include "data-forge.fullname" . }}
            {{- if and .Values.secrets.create (or $awsAccessKeyId $awsSecretAccessKey) }}
            - secretRef:
                name: {{ include "data-forge.fullname" . }}-secrets
            {{- end }}
          {{- with .Values.worker.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - import os, redis; redis.Redis.from_url(os.environ['DATAFORGE_BROKER_REDIS_URL']).ping()
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - import os, redis; redis.Redis.from_url(os.environ['DATAFORGE_BROKER_REDIS_URL']).ping()
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or (eq .Values.dataforge.outputMode "local") .Values.storage.existingClaim .Values.dataforge.extraVolumeMounts .Values.worker.extraVolumeMounts }}
          volumeMounts:
            {{- if or (eq .Values.dataforge.outputMode "local") .Values.storage.existingClaim }}
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
            {{- end }}
            {{- with .Values.dataforge.extraVolumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.worker.extraVolumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or (eq .Values.dataforge.outputMode "local") .Values.storage.existingClaim .Values.extraVolumes }}
      volumes:
        {{- if or (eq .Values.dataforge.outputMode "local") .Values.storage.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-storage" (include "data-forge.fullname" .)) .Values.storage.existingClaim }}
        {{- end }}
        {{- with .Values.extraVolumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
