apiVersion: v1
kind: Service
metadata:
  name: {{ include "data-forge.fullname" . }}-api
  labels:
    {{- include "data-forge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "data-forge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
