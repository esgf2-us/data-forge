name: PR Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  packages: write

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install test dependencies
        run: uv sync --all-groups --extra server

      - name: Run pytest
        run: uv run pytest

  build-and-smoke:
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PR image tag
        run: echo "DATAFORGE_IMAGE_TAG=pr-${{ github.event.number }}" >> "$GITHUB_ENV"

      - name: Build and push PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/esgf2-us/data-forge:pr-${{ github.event.number }}

      - name: Start stack from image
        run: docker compose -f compose.yaml up -d --no-build redis api worker

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f compose.yaml logs --no-color
          exit 1

      - name: Show stack status
        run: docker compose -f compose.yaml ps

      - name: Tear down stack
        if: always()
        run: docker compose -f compose.yaml down -v
