name: Main Image Test

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set latest image tag
        run: echo "DATAFORGE_IMAGE_TAG=latest" >> "$GITHUB_ENV"

      - name: Pull latest image
        run: docker compose -f compose.yaml pull redis api worker

      - name: Start stack from image
        run: docker compose -f compose.yaml up -d --no-build redis api worker

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f compose.yaml logs --no-color
          exit 1

      - name: Show stack status
        run: docker compose -f compose.yaml ps

      - name: Tear down stack
        if: always()
        run: docker compose -f compose.yaml down -v
