services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      DATAFORGE_BROKER_REDIS_URL: redis://redis:6379/0
      DATAFORGE_LOCAL_OUTPUT_PATH: /data/kerchunks
      DATAFORGE_OUTPUT_MODE: local
      DATAFORGE_REDIS_URL: redis://redis:6379/1
    volumes:
      - ${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}:${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}
      - ./data:/data
    command: uvicorn dataforge.api.app:create_app --factory --host 0.0.0.0 --port 8000

  worker:
    build: .
    depends_on:
      - redis
    environment:
      DATAFORGE_BROKER_REDIS_URL: redis://redis:6379/0
      DATAFORGE_LOCAL_OUTPUT_PATH: /data/kerchunks
      DATAFORGE_OUTPUT_MODE: local
      DATAFORGE_REDIS_URL: redis://redis:6379/1
    volumes:
      - ${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}:${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}
      - ./data:/data
    command: dramatiq dataforge.workers.converter_worker
