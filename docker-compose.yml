services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      DATAFORGE_BROKER_REDIS_URL: redis://redis:6379/0
      DATAFORGE_OUTPUT_MODE: local
      DATAFORGE_REDIS_URL: redis://redis:6379/1
      DATAFORGE_WORKSPACE: ${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}
    volumes:
      - ${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}:${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}
      - ./data:/data
    command: uvicorn dataforge.api.app:create_app --factory --host 0.0.0.0 --port 8000

  worker:
    build: .
    depends_on:
      - redis
    environment:
      DATAFORGE_BROKER_REDIS_URL: redis://redis:6379/0
      DATAFORGE_OUTPUT_MODE: local
      DATAFORGE_REDIS_URL: redis://redis:6379/1
      DATAFORGE_WORKSPACE: ${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}
      # Dask parallelization settings
      DATAFORGE_DASK_N_WORKERS: ${DATAFORGE_DASK_N_WORKERS:-}
      DATAFORGE_DASK_THREADS_PER_WORKER: ${DATAFORGE_DASK_THREADS_PER_WORKER:-1}
      DATAFORGE_DASK_MEMORY_LIMIT: ${DATAFORGE_DASK_MEMORY_LIMIT:-2GiB}
      DATAFORGE_DASK_PROCESSES: ${DATAFORGE_DASK_PROCESSES:-true}
      DATAFORGE_DASK_PARALLEL_THRESHOLD: ${DATAFORGE_DASK_PARALLEL_THRESHOLD:-4}
    volumes:
      - ${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}:${DATAFORGE_WORKSPACE:?set DATAFORGE_WORKSPACE}
      - ./data:/data
    command: dramatiq dataforge.workers.converter_worker
