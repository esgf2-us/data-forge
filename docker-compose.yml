services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  garage:
    image: dxflrs/garage:v2.2.0
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    ports:
      - "3900:3900" # S3 API (debuggable from host)
    volumes:
      - ./data:/data
      - ./deploy/garage/garage.toml:/etc/garage.toml:ro

  garage-init:
    image: dxflrs/garage:v2.2.0
    depends_on:
      - garage
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./data:/data
      - ./deploy/garage/garage.toml:/etc/garage.toml:ro
      - ./deploy/garage/init.sh:/init.sh:ro

  api:
    build: .
    depends_on:
      - redis
      - garage-init
    ports:
      - "8000:8000"
    environment:
      DATAFORGE_BROKER_REDIS_URL: redis://redis:6379/0
      DATAFORGE_REDIS_URL: redis://redis:6379/1
      DATAFORGE_S3_ENDPOINT_URL: http://garage:3900
    volumes:
      - ./data:/data
    command:
      - sh
      - -c
      - |
        while [ ! -f /data/garage/s3.env ]; do sleep 0.2; done
        . /data/garage/s3.env
        exec uvicorn dataforge.api.app:create_app --factory --host 0.0.0.0 --port 8000

  worker:
    build: .
    depends_on:
      - redis
      - garage-init
    environment:
      DATAFORGE_BROKER_REDIS_URL: redis://redis:6379/0
      DATAFORGE_REDIS_URL: redis://redis:6379/1
      DATAFORGE_S3_ENDPOINT_URL: http://garage:3900
    volumes:
      - ./data:/data
    command:
      - sh
      - -c
      - |
        while [ ! -f /data/garage/s3.env ]; do sleep 0.2; done
        . /data/garage/s3.env
        exec dramatiq dataforge.workers.converter_worker
